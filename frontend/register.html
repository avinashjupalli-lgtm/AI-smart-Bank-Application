<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Create Account</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <div class="logo">

            <h1>Create Account</h1>

        </div>

        <div class="auth-box">

            <input type="text"
                   id="name"
                   placeholder="Full Name">

            <input type="email"
                   id="email"
                   placeholder="Email">

            <input type="password"
                   id="password"
                   placeholder="Password">

            <button onclick="register()">
                Register
            </button>

            <p class="register-link">

                Already have an account?

                <a href="index.html">
                    Login
                </a>

            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
